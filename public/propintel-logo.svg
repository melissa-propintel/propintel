<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Propintel Property Intelligence logo">
  <defs>
    <radialGradient id="tealGlow" cx="50%" cy="47%" r="46%">
      <stop offset="0%" stop-color="#00756f" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#00756f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="whiteGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.75"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="transparent"/>
  <ellipse cx="800" cy="430" rx="620" ry="260" fill="url(#tealGlow)"/>

  <!-- Primary wordmark -->
  <text x="800" y="430" text-anchor="middle"
        font-family="Montserrat, Avenir Next, Century Gothic, Arial, sans-serif"
        font-size="170" font-weight="300" letter-spacing="8"
        fill="#005c57" stroke="#042b29" stroke-width="2.5">propintel</text>

  <!-- Magnifying glass/home detail inside the o -->
  <g transform="translate(616 352)" filter="url(#softGlow)">
    <circle cx="0" cy="0" r="57" fill="none" stroke="#073b38" stroke-width="11"/>
    <line x1="39" y1="43" x2="86" y2="90" stroke="#f3a328" stroke-width="23" stroke-linecap="round"/>
    <path d="M-27 0 L0 -29 L27 0" fill="none" stroke="#073b38" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-19 0 V31 H19 V0" fill="none" stroke="#073b38" stroke-width="8" stroke-linejoin="round"/>
    <path d="M-6 31 V9 H8 V31" fill="none" stroke="#073b38" stroke-width="8" stroke-linejoin="round"/>
  </g>

  <!-- Divider and dot -->
  <g filter="url(#softGlow)">
    <line x1="430" y1="520" x2="754" y2="520" stroke="#d98513" stroke-width="4" stroke-linecap="round"/>
    <line x1="823" y1="520" x2="1145" y2="520" stroke="#d98513" stroke-width="4" stroke-linecap="round"/>
    <circle cx="789" cy="520" r="11" fill="#00625d" stroke="#073b38" stroke-width="2"/>
  </g>

  <!-- Tagline -->
  <text x="800" y="590" text-anchor="middle"
        font-family="Montserrat, Avenir Next, Century Gothic, Arial, sans-serif"
        font-size="40" font-weight="400" letter-spacing="22"
        fill="#ffffff" stroke="#111111" stroke-width="1.5" filter="url(#whiteGlow)">PROPERTY INTELLIGENCE</text>
</svg>
